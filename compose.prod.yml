networks:
  piglog-prod:
    driver: bridge

volumes:
  timescale_prod_data:
  redis_prod_data:

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: piglog-timescale-prod
    restart: always
    networks:
      - piglog-prod
    environment:
      POSTGRES_USER: ${DB_USER:-piglog}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-piglog_prod}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - timescale_prod_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-piglog} -d ${DB_NAME:-piglog_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    container_name: piglog-redis-prod
    restart: always
    networks:
      - piglog-prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_prod_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    security_opt:
      - no-new-privileges:true

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: piglog-api-prod
    restart: always
    networks:
      - piglog-prod
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-piglog}:${DB_PASSWORD}@timescaledb:5432/${DB_NAME:-piglog_prod}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      APP_URL: ${APP_URL:-http://localhost:3000}
      API_URL: ${API_URL:-http://localhost:3001}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3001}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
    security_opt:
      - no-new-privileges:true

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: piglog-worker-prod
    restart: always
    command: ["npm", "run", "start:worker", "--workspace=@piglog/api"]
    networks:
      - piglog-prod
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-piglog}:${DB_PASSWORD}@timescaledb:5432/${DB_NAME:-piglog_prod}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    security_opt:
      - no-new-privileges:true

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: piglog-web-prod
    restart: always
    networks:
      - piglog-prod
    depends_on:
      - api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    security_opt:
      - no-new-privileges:true
    read_only: true
